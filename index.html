<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial Buat Kamu! ❤️</title>
    <style>
        /* CSS UNTUK TAMPILAN */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #ff9a9e, #fad0c4); /* Warna background pink aesthetic */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Mencegah scrollbar muncul saat hujan emoji */
            color: #333;
            text-align: center;
        }

        #konten-utama {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            z-index: 10; /* Biar konten di atas hujan emoji */
            max-width: 80%;
            display: none; /* Disembunyikan dulu sebelum tombol diklik */
        }

        h1 {
            color: #d63384;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .kata-kata {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .foto-container {
            width: 200px;
            height: 200px;
            border-radius: 50%; /* Membuat foto jadi bulat */
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            margin: 0 auto 20px auto; /* Centering */
        }

        .foto-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Biar foto pas di dalam lingkaran */
        }

        /* Styling Tombol Mulai */
        #tombol-mulai {
            padding: 15px 30px;
            font-size: 1.2em;
            background-color: #d63384;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #tombol-mulai:hover {
            transform: scale(1.1);
        }

        /* CSS UNTUK HUJAN EMOJI */
        .heart {
            position: fixed;
            top: -10vh;
            transform: translateY(0);
            animation: fall 3s linear forwards;
            font-size: 24px;
            z-index: 1; /* Di belakang konten utama */
            user-select: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="tombol-mulai">Klik untuk Kejutan! ❤️</button>
    </div>

    <audio id="laguku" loop>
        <source src="lagu.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung audio.
    </audio>

    <div id="konten-utama">
        <h1>Halo Cantik! 😊</h1>
        
        <div class="foto-container">
            <img src="foto.jpg" alt="Foto Spesial">
        </div>

        <div class="kata-kata">
            <p>cuma mau ngingetin kalau kamu itu hebat!</p>
            <p>jangan pernah menyerah ya, tetap semangat!</p>
            <p>pertahankan senyumkamu, karena dunia butuh senyumanmu. ✨</p>
        </div>
    </div>

    <script>
        // JAVASCRIPT UNTUK LOGIKA
        const tombolMulai = document.getElementById('tombol-mulai');
        const overlay = document.getElementById('overlay');
        const kontenUtama = document.getElementById('konten-utama');
        const lagu = document.getElementById('laguku');

        tombolMulai.addEventListener('click', () => {
            // 1. Sembunyikan tombol, munculkan konten
            overlay.style.display = 'none';
            kontenUtama.style.display = 'block';

            // 2. Putar lagu
            lagu.play().catch(error => {
                console.log("Gagal memutar lagu otomatis, mungkin butuh interaksi user lagi.", error);
            });

            // 3. Mulai hujan emoji
            mulaiHujanHeart();
        });

        // Fungsi membuat hujan emoji
        function buatHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Variasi emoji love
            const emojis = ['❤️', '💖', '💗', '💓', '😻', '🌹'];
            heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            
            // Posisi acak horizontal
            heart.style.left = Math.random() * 100 + "vw";
            
            // Ukuran acak
            heart.style.fontSize = Math.random() * 20 + 20 + "px";
            
            // Durasi jatuh acak (antara 2s sampai 5s)
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            
            // Transparansi acak
            heart.style.opacity = Math.random() * 0.5 + 0.5;

            document.body.appendChild(heart);

            // Hapus element setelah jatuh biar tidak berat
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Jalankan fungsi buatHeart secara terus menerus
        function mulaiHujanHeart() {
            // Buat heart baru setiap 200ms
            setInterval(buatHeart, 200);
        }
    </script>
</body>
</html>
